name: Hostinger Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}


      - name: Create target directory (if missing)
        uses: appleboy/ssh-action@master
        with:
          host: 46.202.186.144
          username: u176367625
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          script: mkdir -p domains/creativeprintjp.com/public_html/saibamaiscpgestao

      - name: Deploy to Hostinger
        uses: appleboy/scp-action@master
        with:
          host: 46.202.186.144
          username: u176367625
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "dist/*"
          target: "domains/creativeprintjp.com/public_html/saibamaiscpgestao"
          strip_components: 1
